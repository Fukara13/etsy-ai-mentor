name: CI

on:
  push:
    branches:
      - main
      - work/next
      - test/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force fail (Gate-S5.1 test)
        shell: bash
        run: |
          echo "PWD=$(pwd)"
          echo "WORKSPACE=$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE" || true
          ls -la "$GITHUB_WORKSPACE/.gates" || true
          if [ -f "$GITHUB_WORKSPACE/.gates/force_ci_fail.txt" ]; then
            echo "Forced CI failure for Gate-S5.1 test (force_ci_fail.txt detected)"
            exit 1
          fi
          echo "No force fail file detected; continuing."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present
