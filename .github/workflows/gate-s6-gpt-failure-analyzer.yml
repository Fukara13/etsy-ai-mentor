# Gate-S6: GPT Failure Analyzer (analysis-only, no code changes).
# Runs when CI fails; requires gate-review label and OPENAI_API_KEY.

name: Gate-S6 GPT Failure Analyzer

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  analyze:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Exit if no PR context
        id: guard_pr
        run: |
          if [ -z "${{ github.event.workflow_run.pull_requests[0].number }}" ]; then
            echo "No PR context, exiting."
            exit 0
          fi
          echo "pr=${{ github.event.workflow_run.pull_requests[0].number }}" >> "$GITHUB_OUTPUT"

      - name: Check gate-review label
        id: guard_label
        if: steps.guard_pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.workflow_run.pull_requests[0].number }}"
          LABELS=$(gh api "repos/${{ github.repository }}/issues/${PR}/labels" --jq '.[].name' 2>/dev/null || echo "")
          if ! echo "$LABELS" | grep -qx "gate-review"; then
            echo "PR does not have gate-review label, exiting."
            exit 0
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Exit if OPENAI_API_KEY missing
        id: guard_key
        if: steps.guard_label.outputs.ok == 'true'
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY secret is missing, exiting."
            exit 0
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Checkout scripts
        if: steps.guard_key.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/gate-s6

      - name: Download workflow run logs
        if: steps.guard_key.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          mkdir -p logs
          curl -sSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/logs" -o logs.zip
          unzip -o -q logs.zip -d logs || true

      - name: Build compact log
        if: steps.guard_key.outputs.ok == 'true'
        run: |
          chmod +x scripts/gate-s6/compact_ci_logs.sh
          scripts/gate-s6/compact_ci_logs.sh "$(pwd)/logs" "$(pwd)/artifacts/ci_compact_log.txt"
          wc -c artifacts/ci_compact_log.txt

      - name: Call OpenAI and parse JSON
        id: openai
        if: steps.guard_key.outputs.ok == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}
        run: |
          MODEL="${OPENAI_MODEL:-gpt-4.1}"
          LOG_CONTENT=$(cat artifacts/ci_compact_log.txt | jq -Rs .)
          SYSTEM='You are an expert CI failure triage assistant. Output ONLY valid JSON with exactly these keys: failure_type, root_cause, suggested_fix, risk_level, confidence, key_evidence. suggested_fix: actionable steps as a single string, max 6 bullets. risk_level: one of LOW, MEDIUM, HIGH. confidence: integer 0-100. key_evidence: array of up to 5 short quoted log snippets.'
          BODY=$(jq -n \
            --arg model "$MODEL" \
            --arg sys "$SYSTEM" \
            --argjson log "$LOG_CONTENT" \
            '{model: $model, input: [{type: "message", role: "system", content: $sys}, {type: "message", role: "user", content: $log}]}')
          RESP=$(curl -sS -X POST "https://api.openai.com/v1/responses" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "$RESP" > artifacts/openai_response.json
          # Extract output text (Responses API: output_items[].content[]?.text)
          TEXT=$(echo "$RESP" | jq -r '
            .output_items[]? // .output?.output_items[]? // empty
            | select(.type? == "message" or .content?) | .content[]? | select(.text?) | .text
          ' 2>/dev/null | head -1)
          if [ -z "$TEXT" ]; then
            TEXT=$(echo "$RESP" | jq -r '.. | .text? // empty' 2>/dev/null | head -1)
          fi
          if [ -z "$TEXT" ]; then
            echo "Could not extract model output; raw response (first 500 chars):"
            head -c 500 artifacts/openai_response.json
            exit 1
          fi
          DELIM="END_JSON_S6_$(date +%s)"
          echo "json<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$TEXT" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - name: Build and post/update PR comment
        if: steps.guard_key.outputs.ok == 'true' && steps.openai.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.workflow_run.pull_requests[0].number }}"
          MARKER="<!-- AI_FAILURE_ANALYSIS:S6 -->"
          JSON="${{ steps.openai.outputs.json }}"
          failure_type=$(echo "$JSON" | jq -r '.failure_type // "unknown"')
          root_cause=$(echo "$JSON" | jq -r '.root_cause // "—"')
          suggested_fix=$(echo "$JSON" | jq -r '.suggested_fix // "—"')
          risk_level=$(echo "$JSON" | jq -r '.risk_level // "—"')
          confidence=$(echo "$JSON" | jq -r '.confidence // "—"')
          key_evidence=$(echo "$JSON" | jq -r '.key_evidence // [] | .[]' 2>/dev/null | sed 's/^/- /')
          {
            echo "## AI Failure Analysis (Gate-S6)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Failure type** | $failure_type |"
            echo "| **Root cause** | $root_cause |"
            echo "| **Suggested fix** | $suggested_fix |"
            echo "| **Risk** | $risk_level |"
            echo "| **Confidence** | $confidence |"
            echo ""
            echo "**Key evidence**"
            echo "$key_evidence"
            echo ""
            echo "---"
            echo "$MARKER"
            echo "*Analysis-only. No changes were applied.*"
          } > comment_body.md
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" --jq '.[] | select(.body | contains("AI_FAILURE_ANALYSIS:S6")) | .id' 2>/dev/null | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -F body=@comment_body.md
            echo "Updated existing analysis comment."
          else
            gh pr comment "$PR" --body-file comment_body.md
            echo "Posted new analysis comment."
          fi
