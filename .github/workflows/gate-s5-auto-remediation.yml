name: Gate-S5 Auto Remediation

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    if: >
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Exit if no PR context
        run: |
          if [ -z "${{ github.event.workflow_run.pull_requests[0].number }}" ]; then
            echo "No PR context, exiting."
            exit 0
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup git identity
        run: |
          git config user.name "gate-s5-bot"
          git config user.email "gate-s5-bot@users.noreply.github.com"

      - name: Remove intentional fail marker
        run: |
          sed -i '/^asd$/d' electron/gates/registry.ts || true

      - name: Commit and push remediation
        run: |
          set -euo pipefail
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          # Remote branch'i çek (fetch/çek)
          git fetch origin "$BRANCH"

          # Remediation değişikliğini stage et (stage/indeksle)
          git add electron/gates/registry.ts

          # Commit at (commit/işleme al)
          git commit -m "fix(auto): remediation attempt 1/3" || echo "No changes to commit"

          # Non-fast-forward önlemek için remote'un üstüne rebase et (rebase/yeniden tabanla)
          git rebase "origin/$BRANCH" || (git rebase --abort && echo "Rebase failed" && exit 1)

          # Push dene; yarış olursa 1 kere daha dene (retry/yeniden dene)
          git push origin HEAD:"$BRANCH" || (
            echo "Push race detected, retrying once..." &&
            git fetch origin "$BRANCH" &&
            git rebase "origin/$BRANCH" &&
            git push origin HEAD:"$BRANCH"
          )
