name: Gate-S5 Auto Remediation

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: gate-s5-auto-remediation-${{ github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  remediate:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.pull_requests && length(github.event.workflow_run.pull_requests) > 0)
    runs-on: ubuntu-latest

    steps:
      - name: Exit if no PR context
        id: pr_context
        run: |
          PR="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [ -z "$PR" ]; then
            echo "No PR context, exiting."
            exit 0
          fi
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Comment remediation attempt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr_context.outputs.pr }}"
          BODY="Auto-remediation attempt triggered by Gate-S5."
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/$PR/comments \
            -d "{\"body\":\"$BODY\"}"

      - name: Retrigger CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr_context.outputs.pr }}"
          echo "Retriggering CI for PR #$PR"