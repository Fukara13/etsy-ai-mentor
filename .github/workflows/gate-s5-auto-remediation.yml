name: Gate-S5 Auto Remediation

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    if: >
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Exit if no PR context
        run: |
          if [ -z "${{ github.event.workflow_run.pull_requests[0].number }}" ]; then
            echo "No PR context, exiting."
            exit 0
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup git identity
        run: |
          git config user.name "gate-s5-bot"
          git config user.email "gate-s5-bot@users.noreply.github.com"

      - name: Remove intentional fail marker
        run: |
          sed -i '/^asd$/d' electron/gates/registry.ts || true

      - name: Commit and push remediation
        run: |
          git add electron/gates/registry.ts
          git commit -m "fix(auto): remediation attempt 1/3" || echo "No changes to commit"
          git push origin HEAD:${{ github.event.workflow_run.head_branch }}
