name: Gate-S4 Retry Controller

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: write
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: gate-s4-retry-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  retry_controller:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR from workflow_run head SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Find PRs associated with this commit (works for PRs from same repo)
            const prs = await github.request('GET /repos/{owner}/{repo}/commits/{ref}/pulls', {
              owner, repo, ref: sha,
              mediaType: { previews: ['groot'] }
            });

            if (!prs.data || prs.data.length === 0) {
              core.setOutput('found', 'false');
              return;
            }

            // Prefer OPEN PR
            const pr = prs.data.find(p => p.state === 'open') ?? prs.data[0];
            core.setOutput('found', 'true');
            core.setOutput('number', String(pr.number));

      - name: Exit if no PR found
        if: ${{ steps.pr.outputs.found != 'true' }}
        run: |
          echo "No PR found for this workflow_run head SHA. Exiting."

      - name: Check gate-review label
        id: gate
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr_number = Number('${{ steps.pr.outputs.number }}');

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: pr_number });
            const labels = (pr.labels || []).map(l => l.name);

            const hasGate = labels.includes('gate-review');
            core.setOutput('ok', hasGate ? 'true' : 'false');

      - name: Exit if gate-review label missing
        if: steps.gate.outputs.ok != 'true'
        run: |
          echo "PR does not have gate-review label. Exiting."

      - name: Determine attempt count (from PR comments)
        id: attempt
        if: steps.gate.outputs.ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr_number = Number('${{ steps.pr.outputs.number }}');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr_number, per_page: 100
            });

            // We track attempts via hidden marker comments:
            // <!-- GATE_S4_ATTEMPT:1 -->
            const marker = /<!--\s*GATE_S4_ATTEMPT:(\d+)\s*-->/g;

            let maxAttempt = 0;
            for (const c of comments) {
              const body = c.body || '';
              let m;
              while ((m = marker.exec(body)) !== null) {
                const n = Number(m[1]);
                if (!Number.isNaN(n)) maxAttempt = Math.max(maxAttempt, n);
              }
            }

            const nextAttempt = maxAttempt + 1;
            core.setOutput('max', String(maxAttempt));
            core.setOutput('next', String(nextAttempt));

      - name: Post exhausted comment and stop at 3/3
        if: steps.attempt.outputs.next >= '4'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr_number = Number('${{ steps.pr.outputs.number }}');

            const body = [
              "🛑 Auto-remediation exhausted (3/3). Manual intervention required.",
              "",
              "I stopped automatically re-running CI to keep control in human hands.",
              "",
              "<!-- GATE_S4_EXHAUSTED:true -->"
            ].join("\n");

            await github.rest.issues.createComment({
              owner, repo, issue_number: pr_number, body
            });

      - name: Post retry comment (attempt 1/3..3/3)
        if: steps.attempt.outputs.next <= '3'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr_number = Number('${{ steps.pr.outputs.number }}');
            const attempt = Number('${{ steps.attempt.outputs.next }}');

            const body = [
              `🔁 Gate-S4 retry controller: CI failed — retrying (attempt ${attempt}/3).`,
              "",
              "No auto-merge. No risky refactors. Pure control-flow.",
              "",
              `<!-- GATE_S4_ATTEMPT:${attempt} -->`
            ].join("\n");

            await github.rest.issues.createComment({
              owner, repo, issue_number: pr_number, body
            });

      - name: Rerun the failed CI workflow_run
        if: steps.attempt.outputs.next <= '3'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const run_id = context.payload.workflow_run.id;

            // Re-run the same workflow run
            await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
              owner, repo, run_id
            });
